<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generative Tawaf — A Gift of Time</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020204;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: rgba(255,255,255,0.5);
        }
        canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 28px 24px 24px;
        }
        #header {
            text-align: center;
        }
        #prayer-name {
            font-size: 10px; font-weight: 300; letter-spacing: 5px;
            text-transform: uppercase; color: rgba(255,255,255,0.25);
            margin-bottom: 4px;
        }
        #time-display {
            font-size: 11px; font-weight: 200; letter-spacing: 2px;
            color: rgba(255,255,255,0.18);
            font-variant-numeric: tabular-nums;
        }
        #footer {
            text-align: center;
        }
        #progress-label {
            font-size: 9px; font-weight: 300; letter-spacing: 3px;
            text-transform: uppercase; color: rgba(255,255,255,0.15);
            margin-bottom: 12px;
        }
        #controls {
            display: flex; gap: 10px;
            pointer-events: auto;
        }
        .ctrl-btn {
            padding: 6px 18px; background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; cursor: pointer; font-size: 10px; font-weight: 300;
            font-family: inherit; letter-spacing: 1px; transition: all 0.4s ease;
            outline: none;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
        .ctrl-btn.active {
            background: rgba(200,160,100,0.12); border-color: rgba(200,160,100,0.25);
            color: rgba(200,160,100,0.7);
        }
        #seed-info {
            font-size: 8px; font-weight: 200; letter-spacing: 2px;
            color: rgba(255,255,255,0.1); margin-top: 8px;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <canvas id="canvas-live" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;"></canvas>
    <div id="overlay">
        <div id="header">
            <div id="prayer-name">Isha · عشاء</div>
            <div id="time-display"></div>
        </div>
        <div id="footer">
            <div id="progress-label"></div>
            <div id="controls">
                <button class="ctrl-btn" id="btn-next">Next Seed</button>
                <button class="ctrl-btn" id="btn-speed">120×</button>
                <button class="ctrl-btn" id="btn-daynight">Night</button>
                <button class="ctrl-btn" id="btn-clear">Clear</button>
            </div>
            <div id="seed-info"></div>
        </div>
    </div>
    <script type="module" src="tawaf.js"></script>
</body>
</html>
