# بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ
# Bismillah ir-Rahman ir-Rahim
#
# Publishes to npm whenever a v* tag is pushed. Re-runs the test suite first
# so a tagged release that fails CI never reaches the registry.
#
# Requires the NPM_TOKEN secret to be set on the repository
# (Settings → Secrets → Actions → New repository secret).

name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  # Manual fallback for the case where multi-tag push didn't fire the
  # tag-push event (observed 2026-05-02: 4 tags pushed in one `git push`
  # → 0 workflow runs). Pass the tag name to publish.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.6.2)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_dispatch needs to checkout the specific tag; tag-push
          # already checks out the right ref by default
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG_VERSION="${{ github.event.inputs.tag }}"
            TAG_VERSION="${TAG_VERSION#v}"
          else
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
