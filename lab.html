<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Islamic Geometry Lab — A Gift of Time</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 40px; left: 0; right: 0;
    text-align: center; z-index: 10; pointer-events: none;
  }
  #prayer-name {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); font-weight: 300;
    transition: opacity 0.6s ease;
  }
  #prayer-arabic {
    font-size: 18px; color: rgba(255,255,255,0.7); margin-top: 6px;
    font-weight: 300; transition: opacity 0.6s ease;
  }
  #hint {
    position: fixed; bottom: 16px; left: 0; right: 0;
    text-align: center; font-size: 10px; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2); z-index: 10;
  }
  #fold-display {
    position: fixed; top: 24px; right: 24px;
    font-size: 10px; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.25); z-index: 10;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="prayer-name">Fajr</div>
  <div id="prayer-arabic">الفجر</div>
</div>
<div id="hint">tap to advance · move to explore</div>
<div id="fold-display"></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ── Prayer data ──
const PRAYERS = [
  { name: 'Fajr',    arabic: 'الفجر',   fold: 6,  desc: '6-fold · hexagonal star' },
  { name: 'Dhuhr',   arabic: 'الظهر',   fold: 12, desc: '12-fold · rosette' },
  { name: 'Asr',     arabic: 'العصر',   fold: 8,  desc: '8-fold · octagonal star' },
  { name: 'Maghrib', arabic: 'المغرب',  fold: 10, desc: '10-fold · decagonal' },
  { name: 'Isha',    arabic: 'العشاء',  fold: 16, desc: '16-fold · deep star' },
];

// ── Color palettes per prayer ──
// [background, line primary, line secondary, glow]
const PALETTES = [
  // Fajr — dawn breaking: deep indigo → warm amber
  [0.04, 0.03, 0.10,   0.76, 0.58, 0.42,   0.45, 0.35, 0.28,   0.90, 0.70, 0.45],
  // Dhuhr — noon clarity: deep blue → white/gold
  [0.03, 0.07, 0.16,   1.00, 1.00, 1.00,   0.76, 0.64, 0.35,   0.85, 0.80, 0.60],
  // Asr — golden afternoon: dark warm brown → amber
  [0.10, 0.06, 0.03,   0.90, 0.72, 0.40,   0.70, 0.50, 0.30,   0.95, 0.80, 0.50],
  // Maghrib — sunset: purple-black → magenta/copper
  [0.08, 0.03, 0.08,   0.85, 0.35, 0.50,   0.90, 0.50, 0.30,   0.80, 0.30, 0.45],
  // Isha — night: near-black → silver/cool white
  [0.02, 0.02, 0.04,   0.60, 0.62, 0.72,   0.40, 0.42, 0.55,   0.50, 0.55, 0.70],
];

// ── Three.js setup ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const scene = new THREE.Scene();

// ── Shader ──
const vertexShader = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position, 1.0);
  }
`;

const fragmentShader = `
  precision highp float;

  uniform float uTime;
  uniform vec2 uResolution;
  uniform float uPrayer;
  uniform float uTransition;
  uniform vec2 uMouse;

  // Palettes: 5 prayers × 4 colors (bg, line1, line2, glow) × 3 channels
  uniform vec3 uBg[5];
  uniform vec3 uLine1[5];
  uniform vec3 uLine2[5];
  uniform vec3 uGlow[5];
  // Fold counts
  uniform float uFolds[5];

  varying vec2 vUv;

  #define PI  3.14159265359
  #define TAU 6.28318530718

  // ── Utility ──
  mat2 rot2(float a) {
    float c = cos(a), s = sin(a);
    return mat2(c, -s, s, c);
  }

  float sdSegment(vec2 p, vec2 a, vec2 b) {
    vec2 pa = p - a, ba = b - a;
    float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
    return length(pa - ba * h);
  }

  float sdCircle(vec2 p, float r) {
    return abs(length(p) - r);
  }

  // Hash for noise
  float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
  }

  // Simple value noise
  float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
  }

  // ── N-fold kaleidoscope ──
  vec2 nFold(vec2 p, float n) {
    float a = atan(p.y, p.x);
    float sector = TAU / n;
    a = mod(a + sector * 0.5, sector) - sector * 0.5;
    a = abs(a);
    return length(p) * vec2(cos(a), sin(a));
  }

  // ── Hexagonal tiling ──
  vec2 hexTile(vec2 uv, out vec2 cellId) {
    vec2 s = vec2(1.0, 1.732050808);
    vec2 a = mod(uv, s) - s * 0.5;
    vec2 b = mod(uv + s * 0.5, s) - s * 0.5;
    if (dot(a, a) < dot(b, b)) {
      cellId = floor(uv / s);
      return a;
    } else {
      cellId = floor((uv + s * 0.5) / s);
      return b;
    }
  }

  // ── Square tiling ──
  vec2 sqTile(vec2 uv, out vec2 cellId) {
    cellId = floor(uv);
    return fract(uv) - 0.5;
  }

  // ── Pattern: Islamic star construction ──
  // Draws lines in the fundamental domain after n-fold + mirror
  float starPattern(vec2 uv, float n, float innerR, float complexity, float time) {
    vec2 p = nFold(uv, n);
    float r = length(uv);

    float d = 1e9;
    float halfSector = PI / n;

    // Outer ring
    d = min(d, sdCircle(uv, 1.0));

    // Main star spoke: from center outward along x-axis
    d = min(d, sdSegment(p, vec2(innerR, 0.0), vec2(1.0, 0.0)));

    // Cross-line: connects star points across the sector
    vec2 outerA = vec2(1.0, 0.0);
    vec2 outerB = vec2(cos(halfSector * 2.0), sin(halfSector * 2.0));
    vec2 midA = mix(outerA, outerB, 0.3 + 0.1 * sin(time * 0.3));
    vec2 midB = mix(outerA, outerB, 0.7 - 0.1 * sin(time * 0.3));
    d = min(d, sdSegment(p, vec2(innerR, 0.0), midA));

    // Inner star construction
    if (complexity > 1.0) {
      vec2 innerA = innerR * vec2(cos(halfSector), sin(halfSector));
      d = min(d, sdSegment(p, vec2(innerR, 0.0), innerA));
      d = min(d, sdCircle(uv, innerR));
    }

    // Additional complexity layers
    if (complexity > 2.0) {
      float midR = (innerR + 1.0) * 0.5;
      d = min(d, sdCircle(uv, midR));
      vec2 mp = midR * vec2(cos(halfSector), sin(halfSector));
      d = min(d, sdSegment(p, vec2(midR, 0.0), mp));
    }

    if (complexity > 3.0) {
      float r2 = innerR * 0.5;
      d = min(d, sdCircle(uv, r2));
      // Interlace lines
      for (float i = 0.0; i < 3.0; i += 1.0) {
        float ri = innerR + (1.0 - innerR) * (i + 1.0) / 4.0;
        vec2 pa = ri * vec2(1.0, 0.0);
        vec2 pb = ri * vec2(cos(halfSector * 0.7), sin(halfSector * 0.7));
        d = min(d, sdSegment(p, pa, pb));
      }
    }

    return d;
  }

  // ── Individual prayer patterns ──

  // Fajr: 6-fold star emerging from dawn
  float patternFajr(vec2 uv, float time) {
    float scale = 3.5;
    vec2 cellId;
    vec2 p = hexTile(uv * scale, cellId);
    float cellNoise = hash(cellId) * 0.5;

    // Animate emergence
    float emerge = smoothstep(0.0, 1.0, uTime * 0.05 + cellNoise);

    float d = starPattern(p * 2.3, 6.0, 0.35, 2.0, time);

    // Second layer at different scale
    vec2 p2 = hexTile(uv * scale * 0.6 + vec2(time * 0.02), cellId);
    float d2 = starPattern(p2 * 2.3, 6.0, 0.4, 1.0, time * 0.7);

    return min(d, d2 * 1.5) * emerge;
  }

  // Dhuhr: 12-fold rosette — maximum complexity
  float patternDhuhr(vec2 uv, float time) {
    float scale = 2.8;
    vec2 cellId;
    vec2 p = hexTile(uv * scale, cellId);

    float d = starPattern(p * 2.0, 12.0, 0.28, 4.0, time);

    // Nested inner pattern
    float d2 = starPattern(p * 4.0, 12.0, 0.35, 2.0, time * 0.5);

    // Outer frame
    float d3 = starPattern(p * 1.2, 6.0, 0.5, 1.0, time * 0.3);

    return min(min(d, d2 * 0.8), d3 * 1.2);
  }

  // Asr: 8-fold octagonal — warm, settled
  float patternAsr(vec2 uv, float time) {
    float scale = 3.0;
    vec2 cellId;
    vec2 p = sqTile(uv * scale, cellId);

    float d = starPattern(p * 2.2, 8.0, 0.32, 3.0, time);

    // Rotated overlay
    vec2 p2 = sqTile((uv * rot2(PI / 8.0)) * scale * 1.2, cellId);
    float d2 = starPattern(p2 * 2.2, 8.0, 0.4, 1.0, time * 0.6);

    return min(d, d2 * 1.3);
  }

  // Maghrib: 10-fold — transitional, dynamic
  float patternMaghrib(vec2 uv, float time) {
    float scale = 2.5;
    vec2 cellId;
    vec2 p = hexTile(uv * scale, cellId);

    // Animated rotation
    float rot = time * 0.05;
    p = p * rot2(rot);

    float d = starPattern(p * 2.0, 10.0, 0.3, 3.0, time);

    // Dissolving edge effect
    float dissolve = noise(uv * 8.0 + time * 0.1) * 0.3;

    return d + dissolve * 0.01;
  }

  // Isha: 16-fold — contemplative, deep
  float patternIsha(vec2 uv, float time) {
    float scale = 2.2;
    vec2 cellId;
    vec2 p = hexTile(uv * scale, cellId);

    float d = starPattern(p * 1.8, 16.0, 0.25, 4.0, time);

    // Breathing inner star
    float breathe = 0.3 + 0.05 * sin(time * 0.5);
    float d2 = starPattern(p * 3.5, 16.0, breathe, 2.0, time * 0.3);

    // Stars twinkling
    float twinkle = noise(uv * 20.0 + time * 0.2);
    twinkle = smoothstep(0.82, 0.85, twinkle) * 0.004;

    return min(d, d2 * 0.7) - twinkle;
  }

  // ── Get pattern for a prayer index ──
  float getPattern(vec2 uv, float prayer, float time) {
    // Integer prayer index
    int idx = int(floor(prayer + 0.5));
    if (idx == 0) return patternFajr(uv, time);
    if (idx == 1) return patternDhuhr(uv, time);
    if (idx == 2) return patternAsr(uv, time);
    if (idx == 3) return patternMaghrib(uv, time);
    return patternIsha(uv, time);
  }

  void main() {
    vec2 uv = (gl_FragCoord.xy - uResolution * 0.5) / min(uResolution.x, uResolution.y);

    // Subtle mouse parallax
    uv += (uMouse - 0.5) * 0.08;

    float time = uTime;

    // Current and next prayer for blending
    float prayerF = uPrayer;
    int current = int(floor(prayerF));
    int next = int(mod(float(current) + 1.0, 5.0));
    float blend = fract(prayerF);

    // Get distances for current and next pattern
    float d1 = getPattern(uv, float(current), time);
    float d2 = getPattern(uv, float(next), time);

    // Blend the distance fields
    float d = mix(d1, d2, smoothstep(0.3, 0.7, blend));

    // Convert distance to line intensity
    float pixelW = 1.5 / min(uResolution.x, uResolution.y);
    float lineW = pixelW * 1.2;

    // Primary line
    float line1 = smoothstep(lineW * 1.5, lineW * 0.3, d);
    // Glow (wider, dimmer)
    float glow = smoothstep(lineW * 12.0, lineW * 2.0, d) * 0.35;
    // Fine inner line
    float line2 = smoothstep(lineW * 0.8, lineW * 0.1, d) * 0.6;

    // Blend colors between prayers
    vec3 bg = mix(uBg[current], uBg[next], smoothstep(0.2, 0.8, blend));
    vec3 col1 = mix(uLine1[current], uLine1[next], smoothstep(0.2, 0.8, blend));
    vec3 col2 = mix(uLine2[current], uLine2[next], smoothstep(0.2, 0.8, blend));
    vec3 colGlow = mix(uGlow[current], uGlow[next], smoothstep(0.2, 0.8, blend));

    // Composite
    vec3 color = bg;
    color = mix(color, colGlow, glow);
    color = mix(color, col2, line1 * 0.5);
    color = mix(color, col1, line1);
    color += col1 * line2 * 0.3;

    // Subtle vignette
    float vig = 1.0 - dot(uv * 0.8, uv * 0.8);
    vig = smoothstep(0.0, 0.5, vig);
    color *= 0.7 + 0.3 * vig;

    // Film grain
    float grain = (hash(gl_FragCoord.xy + fract(time)) - 0.5) * 0.03;
    color += grain;

    gl_FragColor = vec4(color, 1.0);
  }
`;

// ── Material ──
const bgColors = PALETTES.map(p => new THREE.Vector3(p[0], p[1], p[2]));
const line1Colors = PALETTES.map(p => new THREE.Vector3(p[3], p[4], p[5]));
const line2Colors = PALETTES.map(p => new THREE.Vector3(p[6], p[7], p[8]));
const glowColors = PALETTES.map(p => new THREE.Vector3(p[9], p[10], p[11]));
const foldCounts = PRAYERS.map(p => p.fold);

const material = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uResolution: { value: new THREE.Vector2(window.innerWidth * renderer.getPixelRatio(), window.innerHeight * renderer.getPixelRatio()) },
    uPrayer: { value: 0.0 },
    uTransition: { value: 0.0 },
    uMouse: { value: new THREE.Vector2(0.5, 0.5) },
    uBg: { value: bgColors },
    uLine1: { value: line1Colors },
    uLine2: { value: line2Colors },
    uGlow: { value: glowColors },
    uFolds: { value: foldCounts },
  },
  vertexShader,
  fragmentShader,
});

const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
scene.add(plane);

// ── State ──
let currentPrayer = 0;
let targetPrayer = 0;
let prayerSmooth = 0;
let autoAdvanceTimer = 0;
const AUTO_INTERVAL = 10; // seconds per prayer

// ── UI updates ──
const nameEl = document.getElementById('prayer-name');
const arabicEl = document.getElementById('prayer-arabic');
const foldEl = document.getElementById('fold-display');

function updateUI(idx) {
  nameEl.style.opacity = '0';
  arabicEl.style.opacity = '0';
  setTimeout(() => {
    nameEl.textContent = PRAYERS[idx].name;
    arabicEl.textContent = PRAYERS[idx].arabic;
    foldEl.textContent = PRAYERS[idx].desc;
    nameEl.style.opacity = '1';
    arabicEl.style.opacity = '1';
  }, 300);
}
updateUI(0);
foldEl.textContent = PRAYERS[0].desc;

// ── Interaction ──
let mx = 0.5, my = 0.5;
window.addEventListener('mousemove', e => {
  mx = e.clientX / window.innerWidth;
  my = 1.0 - e.clientY / window.innerHeight;
});

window.addEventListener('click', () => {
  currentPrayer = (currentPrayer + 1) % 5;
  targetPrayer = currentPrayer;
  updateUI(currentPrayer);
  autoAdvanceTimer = 0;
});

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    currentPrayer = (currentPrayer + 1) % 5;
    targetPrayer = currentPrayer;
    updateUI(currentPrayer);
    autoAdvanceTimer = 0;
  } else if (e.key === 'ArrowLeft') {
    currentPrayer = (currentPrayer + 4) % 5;
    targetPrayer = currentPrayer;
    updateUI(currentPrayer);
    autoAdvanceTimer = 0;
  }
});

// Device orientation for mobile
window.addEventListener('deviceorientation', e => {
  if (e.gamma !== null) mx = 0.5 + (e.gamma / 90) * 0.5;
  if (e.beta !== null) my = 0.5 + ((e.beta - 45) / 90) * 0.5;
});

// ── Resize ──
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.uResolution.value.set(
    window.innerWidth * renderer.getPixelRatio(),
    window.innerHeight * renderer.getPixelRatio()
  );
});

// ── External control for screenshots ──
window._labSetPrayer = (idx) => {
  currentPrayer = idx;
  targetPrayer = idx;
  prayerSmooth = idx;
  material.uniforms.uPrayer.value = idx;
  updateUI(idx);
  autoAdvanceTimer = 0;
};

// ── Animation loop ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  material.uniforms.uTime.value += dt;

  // Auto advance
  autoAdvanceTimer += dt;
  if (autoAdvanceTimer > AUTO_INTERVAL) {
    autoAdvanceTimer = 0;
    currentPrayer = (currentPrayer + 1) % 5;
    targetPrayer = currentPrayer;
    updateUI(currentPrayer);
  }

  // Smooth prayer transition
  prayerSmooth += (targetPrayer - prayerSmooth) * 0.03;
  // Handle wraparound
  if (Math.abs(targetPrayer - prayerSmooth) > 2.5) {
    prayerSmooth = targetPrayer;
  }
  material.uniforms.uPrayer.value = prayerSmooth;

  // Smooth mouse
  const umx = material.uniforms.uMouse.value;
  umx.x += (mx - umx.x) * 0.05;
  umx.y += (my - umx.y) * 0.05;

  renderer.render(scene, camera);
}
animate();

console.log('[lab] Islamic Geometry Lab loaded');
console.log('[lab] Click/tap/arrow keys to cycle prayers');
console.log('[lab] window._labSetPrayer(0-4) for direct control');
</script>
</body>
</html>
