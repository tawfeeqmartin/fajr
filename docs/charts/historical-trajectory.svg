<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif" font-size="11"><rect width="880" height="380" fill="#fafaf7" /><text x="440" y="28" text-anchor="middle" fill="#1a1a1a" font-size="17" font-weight="600">Historical accuracy trajectory — Experiments 1–7 (Aladhan-only baseline)</text><text x="440" y="48" text-anchor="middle" fill="#1a1a1a" font-size="11" opacity="0.8">24.17 → 1.55 min headline gain — but 89% of that came from Exp 3 fixing an evaluator bug, not engine work</text><rect x="70" y="60" width="760" height="220" fill="#f1efe8" /><line x1="70" y1="280" x2="830" y2="280" stroke="#dcdcd0" stroke-width="0.5" stroke-dasharray="2,3" /><text x="64" y="283" text-anchor="end" fill="#5a5a5a" font-size="9">0.0</text><line x1="70" y1="236" x2="830" y2="236" stroke="#dcdcd0" stroke-width="0.5" stroke-dasharray="2,3" /><text x="64" y="239" text-anchor="end" fill="#5a5a5a" font-size="9">5.0</text><line x1="70" y1="192" x2="830" y2="192" stroke="#dcdcd0" stroke-width="0.5" stroke-dasharray="2,3" /><text x="64" y="195" text-anchor="end" fill="#5a5a5a" font-size="9">10.0</text><line x1="70" y1="148" x2="830" y2="148" stroke="#dcdcd0" stroke-width="0.5" stroke-dasharray="2,3" /><text x="64" y="151" text-anchor="end" fill="#5a5a5a" font-size="9">15.0</text><line x1="70" y1="104" x2="830" y2="104" stroke="#dcdcd0" stroke-width="0.5" stroke-dasharray="2,3" /><text x="64" y="107" text-anchor="end" fill="#5a5a5a" font-size="9">20.0</text><line x1="70" y1="60" x2="830" y2="60" stroke="#dcdcd0" stroke-width="0.5" stroke-dasharray="2,3" /><text x="64" y="63" text-anchor="end" fill="#5a5a5a" font-size="9">25.0</text><text x="31" y="170" transform="rotate(-90 31 170)" text-anchor="middle" fill="#5a5a5a" font-size="10">WMAE (minutes)</text><line x1="70" y1="262.4" x2="830" y2="262.4" stroke="#c8881a" stroke-width="1" stroke-dasharray="4,4" opacity="0.6" /><text x="822" y="256.4" text-anchor="end" fill="#c8881a" font-size="9" opacity="0.85">~2 min atmospheric refraction floor (Young 2006)</text><polyline points="70.0,67.3 260.0,91.8 450.0,259.7 640.0,263.9 830.0,266.4" fill="none" stroke="#1f7a4d" stroke-width="2.5" /><line x1="450" y1="70" x2="450" y2="280" stroke="#c83030" stroke-width="1" stroke-dasharray="3,4" opacity="0.6" /><text x="456" y="82" fill="#c83030" font-size="10" opacity="0.95">eval-bug fix landed here</text><text x="456" y="96" fill="#c83030" font-size="9" opacity="0.8">— real engine progress is 2.31 → 1.55 ≈ 33%, not the 93.6% headline</text><circle cx="70.0" cy="67.3" r="4.5" fill="#1f7a4d" stroke="#fafaf7" stroke-width="2" /><text x="70.0" y="55.3" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">24.17</text><text x="70.0" y="298" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">Baseline</text><text x="70.0" y="314" text-anchor="middle" fill="#5a5a5a" font-size="9">ISNA hardcoded for all regions</text><circle cx="260.0" cy="91.8" r="4.5" fill="#1f7a4d" stroke="#fafaf7" stroke-width="2" /><text x="260.0" y="79.8" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">21.39</text><text x="260.0" y="298" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">Exp 1</text><text x="260.0" y="314" text-anchor="middle" fill="#5a5a5a" font-size="9">Regional method auto-selection</text><circle cx="450.0" cy="259.7" r="4.5" fill="#1f7a4d" stroke="#fafaf7" stroke-width="2" /><text x="450.0" y="247.7" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">2.31</text><text x="450.0" y="298" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">Exp 3</text><text x="450.0" y="314" text-anchor="middle" fill="#5a5a5a" font-size="9">High-lat Isha + eval-bug fix (most of the gain)</text><circle cx="640.0" cy="263.9" r="4.5" fill="#1f7a4d" stroke="#fafaf7" stroke-width="2" /><text x="640.0" y="251.9" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">1.83</text><text x="640.0" y="298" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">Exp 5</text><text x="640.0" y="314" text-anchor="middle" fill="#5a5a5a" font-size="9">Reykjavik MiddleOfTheNight refinement</text><circle cx="830.0" cy="266.4" r="4.5" fill="#1f7a4d" stroke="#fafaf7" stroke-width="2" /><text x="830.0" y="254.4" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">1.55</text><text x="830.0" y="298" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">Exp 6</text><text x="830.0" y="314" text-anchor="middle" fill="#5a5a5a" font-size="9">+5 cities: Jakarta, Karachi, Dubai, Paris, Toronto</text></svg>