<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .g { fill: none; stroke: #c9a84c; stroke-linecap: round; stroke-linejoin: round; }
      .gf { fill: #c9a84c; stroke: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="512" height="512" rx="64"/>

  <g transform="translate(256, 260)">

    <!-- Main cube - front face (slightly taller than wide, like real Kaaba proportions ~13.1m x 11.03m x 12.86m) -->
    <rect class="g" x="-85" y="-100" width="170" height="188" stroke-width="2.5"/>

    <!-- Top face (isometric perspective - shallow angle) -->
    <polygon class="g" points="-85,-100 -50,-128 120,-128 85,-100" stroke-width="2.5"/>

    <!-- Right face -->
    <polygon class="g" points="85,-100 120,-128 120,60 85,88" stroke-width="2.5"/>

    <!-- Kiswah gold band - the prominent horizontal embroidered strip at ~2/3 height -->
    <!-- Front band -->
    <rect class="g" x="-85" y="-28" width="170" height="22" stroke-width="1.8"/>
    <!-- Right band (perspective) -->
    <polygon class="g" points="85,-28 120,-56 120,-34 85,-6" stroke-width="1.5"/>

    <!-- Calligraphy detail marks on Kiswah band -->
    <line class="g" x1="-68" y1="-17" x2="-42" y2="-17" stroke-width="1.2"/>
    <line class="g" x1="-32" y1="-17" x2="-10" y2="-17" stroke-width="1.2"/>
    <line class="g" x1="2" y1="-17" x2="20" y2="-17" stroke-width="1.2"/>
    <line class="g" x1="32" y1="-17" x2="68" y2="-17" stroke-width="1.2"/>

    <!-- Door (Bab al-Kaaba) - elevated, right of center -->
    <rect class="g" x="6" y="20" width="34" height="54" stroke-width="1.5" rx="0"/>
    <!-- Door arch top -->
    <path class="g" d="M 6,20 A 17,14 0 0 1 40,20" stroke-width="1.5" fill="none"/>

    <!-- Hajar al-Aswad (Black Stone) - small circle at east corner (bottom-left from this view) -->
    <circle class="gf" cx="-85" cy="88" r="4.5"/>

    <!-- Vertical drape lines on front face (subtle fabric folds) -->
    <line class="g" x1="-50" y1="-6" x2="-50" y2="88" stroke-width="0.6" opacity="0.4"/>
    <line class="g" x1="-15" y1="-6" x2="-15" y2="88" stroke-width="0.6" opacity="0.4"/>
    <line class="g" x1="55" y1="-6" x2="55" y2="88" stroke-width="0.6" opacity="0.4"/>

  </g>
</svg>
